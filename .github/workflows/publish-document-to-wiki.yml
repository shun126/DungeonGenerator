name: Publish Document to Wiki

on:
  push:
    branches:
      - main
    paths:
      - 'Document/**'
      - '.github/workflows/publish-document-to-wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check repository visibility and wiki settings
        id: repo-settings
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const response = await github.rest.repos.get({ owner, repo });
            const isPrivate = response.data.private;
            const hasWiki = response.data.has_wiki;

            if (isPrivate) {
              core.info('Repository is private. Skip wiki publish.');
            }

            if (!hasWiki) {
              core.info('Wiki is disabled. Skip wiki publish.');
            }

            const shouldPublish = !isPrivate && hasWiki;
            core.setOutput('should_publish', shouldPublish ? 'true' : 'false');

      - name: Sync Document directory to Wiki
        if: steps.repo-settings.outputs.should_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu

          REPO="${{ github.repository }}"
          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.wiki.git"

          git clone "${WIKI_URL}" wiki

          find wiki -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a Document/. wiki/

          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "docs: sync Document from ${GITHUB_SHA}"
            git push
          else
            echo "No changes to publish"
          fi
